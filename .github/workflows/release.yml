name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for all branches and tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/package-lock.json', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('mobile/app.json') }}

      - name: Create .env file
        working-directory: ./mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env

      - name: Install dependencies
        working-directory: ./mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm ci
        
      - name: Setup git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Validate environment variables
        working-directory: ./mobile
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ]; then
            echo "❌ EXPO_PUBLIC_SUPABASE_URL is not set"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "❌ EXPO_PUBLIC_SUPABASE_ANON_KEY is not set"
            exit 1
          fi
          case "$EXPO_PUBLIC_SUPABASE_URL" in
            https://*)
              ;;
            *)
              echo "❌ EXPO_PUBLIC_SUPABASE_URL must start with https://"
              exit 1
              ;;
          esac
          URL_HOST="${EXPO_PUBLIC_SUPABASE_URL#https://}"
          URL_HOST="${URL_HOST%%/*}"
          if [ -z "$URL_HOST" ] || [[ "$URL_HOST" != *.* ]]; then
            echo "❌ EXPO_PUBLIC_SUPABASE_URL must include a valid host"
            exit 1
          fi
          echo "✅ Environment variables are configured"

      - name: Generate native project
        working-directory: ./mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_FILE: meugasto-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx expo prebuild --clean --platform android

      - name: Decode keystore
        working-directory: ./mobile/android
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/meugasto-release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK
        working-directory: ./mobile/android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --parallel --build-cache -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Validate APK size
        run: |
          APK_SIZE=$(stat -c%s mobile/android/app/build/outputs/apk/release/app-release.apk)
          MIN_SIZE=40000000
          if [ $APK_SIZE -lt $MIN_SIZE ]; then
            echo "⚠️ APK muito pequeno ($APK_SIZE bytes). Possível problema no build."
            exit 1
          fi
          echo "✓ APK size: $APK_SIZE bytes"

      - name: Prepare release asset
        id: prepare_release
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          cp mobile/android/app/build/outputs/apk/release/app-release.apk "mobile/android/app/build/outputs/apk/release/meugastov${VERSION_NAME}.apk"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Create or Update Release
        run: |
          VERSION_NAME="${GITHUB_REF_NAME#v}"
          RELEASE_TAG="v${VERSION_NAME}"
          
          # Check if release already exists
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release ${RELEASE_TAG} already exists, uploading asset..."
            gh release upload "${RELEASE_TAG}" "mobile/android/app/build/outputs/apk/release/meugastov${VERSION_NAME}.apk" --clobber
          else
            echo "Creating new release ${RELEASE_TAG}..."
            gh release create "${RELEASE_TAG}" \
              --generate-notes \
              "mobile/android/app/build/outputs/apk/release/meugastov${VERSION_NAME}.apk"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prepare next development version
        if: success()
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Fetch dev branch
          git fetch origin dev
          
          # Checkout dev branch
          git checkout dev
          
          # Get current version from the released tag
          CURRENT_VERSION="${{ steps.prepare_release.outputs.VERSION_NAME }}"
          
          # Bump patch version (e.g., 1.3.3 -> 1.3.4)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          
          # Update version in app.json
          cd mobile
          sed -i "s/\"version\": \"${CURRENT_VERSION}\"/\"version\": \"${NEXT_VERSION}\"/" app.json
          
          # Also update buildNumber for iOS (increment by 1)
          BUILD_NUMBER=$(grep -o '"buildNumber": "[0-9]*"' app.json | grep -o '[0-9]*')
          NEXT_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          sed -i "s/\"buildNumber\": \"${BUILD_NUMBER}\"/\"buildNumber\": \"${NEXT_BUILD_NUMBER}\"/" app.json
          
          # Update versionCode for Android (increment by 1)
          VERSION_CODE=$(grep -o '"versionCode": [0-9]*' app.json | grep -o '[0-9]*')
          NEXT_VERSION_CODE=$((VERSION_CODE + 1))
          sed -i "s/\"versionCode\": ${VERSION_CODE}/\"versionCode\": ${NEXT_VERSION_CODE}/" app.json
          
          # Commit changes
          git add app.json
          git commit -m "chore: bump version to ${NEXT_VERSION} for next development cycle [skip ci]"
          
          # Push dev branch
          git push origin dev
          
          # Create PR from dev to main
          gh pr create \
            --title "chore: bump version to ${NEXT_VERSION} for next development cycle" \
            --body "This PR bumps the version to ${NEXT_VERSION} after the release of v${CURRENT_VERSION}.\n\n[Skip CI]" \
            --base main \
            --head dev \
            --label "version-bump" \
            || echo "PR already exists or failed to create"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
