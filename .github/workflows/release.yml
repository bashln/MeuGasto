name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/package-lock.json', 'mobile/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: ~/android-sdk
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('mobile/app.json') }}

      - name: Create .env file
        working-directory: ./mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=$EXPO_PUBLIC_SUPABASE_URL" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=$EXPO_PUBLIC_SUPABASE_ANON_KEY" >> .env

      - name: Install dependencies
        working-directory: ./mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm ci

      - name: Validate environment variables
        working-directory: ./mobile
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_URL" ]; then
            echo "❌ EXPO_PUBLIC_SUPABASE_URL is not set"
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "❌ EXPO_PUBLIC_SUPABASE_ANON_KEY is not set"
            exit 1
          fi
          echo "✅ Environment variables are configured"

      - name: Generate native project
        working-directory: ./mobile
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_FILE: meugasto-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx expo prebuild --clean --platform android

      - name: Decode keystore
        working-directory: ./mobile/android
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/meugasto-release.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK
        working-directory: ./mobile/android
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --parallel --build-cache -PreactNativeArchitectures=armeabi-v7a,arm64-v8a

      - name: Validate APK size
        run: |
          APK_SIZE=$(stat -c%s mobile/android/app/build/outputs/apk/release/app-release.apk)
          MIN_SIZE=40000000
          if [ $APK_SIZE -lt $MIN_SIZE ]; then
            echo "⚠️ APK muito pequeno ($APK_SIZE bytes). Possível problema no build."
            exit 1
          fi
          echo "✓ APK size: $APK_SIZE bytes"

      - name: Prepare release asset
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk "mobile/android/app/build/outputs/apk/release/MeuGasto-${{ github.ref_name }}.apk"

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            "mobile/android/app/build/outputs/apk/release/MeuGasto-${{ github.ref_name }}.apk"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
