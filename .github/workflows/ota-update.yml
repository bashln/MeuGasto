name: OTA Update

on:
  push:
    branches:
      - main
      - dev
      - testing
    paths:
      - 'mobile/src/**'
      - 'mobile/assets/**'
      - 'mobile/app.json'
      - 'mobile/package.json'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: ./mobile
        run: npm ci

      - name: Set EAS channel
        id: channel
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "channel=production" >> $GITHUB_OUTPUT
          else
            echo "channel=preview" >> $GITHUB_OUTPUT
          fi

      - name: Publish EAS Update
        working-directory: ./mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx eas-cli update --channel ${{ steps.channel.outputs.channel }} --message "Auto update from ${{ github.sha }}" --non-interactive
