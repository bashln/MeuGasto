name: Bump Dev Version

on:
  workflow_dispatch:
    inputs:
      released_version:
        description: 'Versão liberada (sem prefixo v, ex: 1.3.5)'
        required: true
        type: string

jobs:
  bump-dev-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      RELEASED_VERSION: ${{ inputs.released_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Validate released version
        run: |
          if [ -z "$RELEASED_VERSION" ] || ! echo "$RELEASED_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ Versão inválida: '$RELEASED_VERSION'. Use o formato X.Y.Z (ex: 1.3.5)"
            exit 1
          fi

      - name: Setup git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare next development version
        working-directory: ./mobile
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "$RELEASED_VERSION"
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"

          TMP_APP_JSON="$(mktemp)"
          jq \
            --arg version "$NEXT_VERSION" \
            '.expo.version = $version
             | .expo.ios.buildNumber = ((.expo.ios.buildNumber | tonumber) + 1 | tostring)
             | .expo.android.versionCode = ((.expo.android.versionCode | tonumber) + 1)' \
            app.json > "$TMP_APP_JSON"
          mv "$TMP_APP_JSON" app.json

          echo "NEXT_VERSION=$NEXT_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push version bump
        run: |
          git add mobile/app.json
          git commit -m "chore: bump version to ${NEXT_VERSION} for next development cycle [skip ci]"
          git push origin dev

      - name: Create PR from dev to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: bump version to ${NEXT_VERSION} for next development cycle" \
            --body "This PR bumps the version to ${NEXT_VERSION} after the release of v${RELEASED_VERSION}.\n\n[Skip CI]" \
            --base main \
            --head dev \
            --label "version-bump" \
            || { echo "⚠️ PR creation skipped (may already exist for dev→main)"; true; }
